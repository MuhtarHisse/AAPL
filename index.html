<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hisse Terminal</title><script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script></head><body><div id="r"></div><script type="text/babel">const{useState,useEffect,useRef}=React;function App(){const[k,setK]=useState(()=>localStorage.getItem("avk")||"");if(!k)return<div style={{padding:40,maxWidth:400,margin:"auto"}}><h2>🔑 API Key Gir</h2><p>alphavantage.co sitesinden ücretsiz key al</p><input placeholder="Key yapıştır..." style={{width:"100%",padding:10,marginTop:10,fontSize:14}} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value){localStorage.setItem("avk",e.target.value);setK(e.target.value)}}}/><br/><small>Enter'a bas</small></div>;return<div style={{padding:20}}><h1>📈 Hisse Terminal</h1><p>Key: {k.slice(0,8)}... <button onClick={()=>{localStorage.removeItem("avk");setK("")}}>Değiştir</button></p><p>Şimdi çalışıyor! Geliştiriliyor...</p></div>}ReactDOM.createRoot(document.getElementById("r")).render(<App/>);</script></body></html>
